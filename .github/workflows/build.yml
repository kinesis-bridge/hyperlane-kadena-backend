name: Create a complete package for Hyperlane Backed
on:
  push:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Hyperlane Monorepo
        uses: actions/checkout@v4
        with:
          repository: kinesis-bridge/hyperlane-monorepo-kda-community
          path: hyperlane
          ref: kadena-support-develop

      - name: Install tools
        run: apt-get install -y yq jq

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Node JS
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build Hyperlane agents
        run: |
          cd hyperlane/rust
          cargo build --release --bin relayer
          cargo build --release --bin validator

      - name: Prepare artifact
        run: |
          mkdir -p dist/agents
          cp hyperlane/rust/target/release/relayer dist/agents
          cp hyperlane/rust/target/release/validator dist/agents

          strip dist/agents/validator
          strip dist/agents/reakyer


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/